<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Normal mi? - Fiyat Karşılaştırma Platformu</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32" class="logo-icon">
                    <!-- Üst chevron - yuvarlatılmış köşeler -->
                    <path d="M16 4 L8 12 L16 20 L24 12 Z" 
                          fill="none" 
                          stroke="currentColor" 
                          stroke-width="3" 
                          stroke-linecap="round" 
                          stroke-linejoin="round"/>
                    <!-- Alt chevron - yuvarlatılmış köşeler -->
                    <path d="M16 12 L8 20 L16 28 L24 20 Z" 
                          fill="none" 
                          stroke="currentColor" 
                          stroke-width="3" 
                          stroke-linecap="round" 
                          stroke-linejoin="round"/>
                </svg>
                Normal mi?
            </h1>
        </header>

        <main>
            <div class="hero-section">
                <h2 class="hero-title">Pahalı Mı alıyorsun? Piyasa fiyatını hemen keşfet.</h2>
                <div class="search-container">
                    <input type="text" id="categorySearch" class="search-input" placeholder="Örnek: Bilgisayar Oyunları" autocomplete="off">
                    <button id="searchButton" class="search-button">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 16 16">
                            <path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001c.03.04.062.078.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1.007 1.007 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0z"/>
                        </svg>
                    </button>
                </div>
            </div>
            <div class="categories-grid" id="categoriesGrid">
                <!-- Kategoriler buraya yüklenecek -->
            </div>
        </main>
    </div>

    <script src="js/api.js?v=2"></script>
    <script src="js/index.js?v=2"></script>
</body>
</html>
